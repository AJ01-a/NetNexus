# NETNEXUS is a static site — no build step, publish the repo root as-is.
# (Cloudflare Pages ignores this file; set "Build command: none" and
#  "Build output directory: /" in its dashboard instead.)
[build]
  publish = "."
  command = ""

# Sensible defaults for a public static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
