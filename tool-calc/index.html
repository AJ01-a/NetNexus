<!DOCTYPE html>
<html lang="en" data-galaxy="gen">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#02050a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><polygon points='32,5 55,18.5 55,45.5 32,59 9,45.5 9,18.5' fill='%23041018' stroke='%2300e5ff' stroke-width='2.5'/><circle cx='32' cy='32' r='15' fill='none' stroke='%2300e5ff' stroke-width='1.5' opacity='.55'/><circle cx='32' cy='32' r='8' fill='%2300e5ff'/><circle cx='47' cy='32' r='2.6' fill='%237df9ff'/></svg>">
<title>NETNEXUS // GEN-22 EVERYDAY CALCULATORS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" onerror="window.__twFail=1"></script>
<style>
:root{--red:#ff4757;--grn:#2eff9e;--yel:#ffd166;--or:#ff9d33;--mag:#f24bff;--mag2:#ff8bff;--mag-glow:rgba(242,75,255,.34);--bg0:#02050a;--ink:#e2f7ff;--mut:#6b93ab;--panel:rgba(7,17,27,.82);--mono:'Share Tech Mono',Consolas,monospace;--disp:'Orbitron','Segoe UI',sans-serif;--ui:'Rajdhani','Segoe UI',sans-serif}
html[data-galaxy="gen"]{--acc:#ff9d33;--acc2:#ffc46b;--accd:rgba(255,157,51,.14);--line:rgba(255,157,51,.30);--acc-glow:rgba(255,157,51,.32)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1200px 700px at 50% -12%,#0a1e30 0%,var(--bg0) 58%) fixed,var(--bg0);color:var(--ink);font-family:var(--ui);min-height:100vh;overflow-x:hidden}
::selection{background:var(--accd);color:var(--acc2)}
#bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;width:100vw;height:100vh}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.15) 2px 3px);box-shadow:inset 0 0 200px rgba(0,0,0,.7)}
#topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(4,12,20,.94),rgba(4,12,20,.7));backdrop-filter:blur(10px)}
.brand{font-family:var(--disp);font-weight:700;font-size:14px;letter-spacing:.22em;color:var(--acc);text-shadow:0 0 14px var(--acc-glow);white-space:nowrap}
.brand b{color:var(--ink);font-weight:500}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.18em;border:1px solid var(--line);color:var(--acc2);padding:3px 9px;background:var(--accd);white-space:nowrap}
.chip.ghost{color:var(--mut);border-color:rgba(107,147,171,.3);background:none}
.spacer{flex:1}
#clk{font-family:var(--mono);font-size:11px;color:var(--mut);letter-spacing:.12em;white-space:nowrap}
#clk b{color:var(--acc2);font-weight:400}
.rtn{font-family:var(--disp);font-size:9.5px;letter-spacing:.24em;color:var(--acc);border:1px solid var(--line);background:var(--accd);padding:7px 12px;text-decoration:none;transition:.25s;white-space:nowrap}
.rtn:hover{background:var(--acc);color:#02131c;box-shadow:0 0 18px var(--acc-glow)}
#jstrip{position:relative;z-index:5;font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--acc2);padding:8px 20px;border-bottom:1px solid rgba(107,147,171,.14);background:rgba(3,10,16,.6)}
#jstrip .jj{color:var(--mut);letter-spacing:.2em}
#wrap{position:relative;z-index:5;max-width:1120px;margin:22px auto 96px;padding:0 20px}
.mode-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.mtab{background:none;border:1px solid var(--line);color:var(--mut);font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:8px 15px;cursor:pointer;transition:.2s}
.mtab.on{background:var(--accd);border-color:var(--acc);color:var(--acc);box-shadow:0 0 12px var(--accd)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:840px){.cols{grid-template-columns:1fr}}
.panel{position:relative;background:var(--panel);border:1px solid var(--line);padding:18px;backdrop-filter:blur(10px)}
.panel::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(var(--acc),var(--acc)) left 0 top 0/14px 2px,linear-gradient(var(--acc),var(--acc)) left 0 top 0/2px 14px,linear-gradient(var(--acc),var(--acc)) right 0 top 0/14px 2px,linear-gradient(var(--acc),var(--acc)) right 0 top 0/2px 14px,linear-gradient(var(--acc),var(--acc)) left 0 bottom 0/14px 2px,linear-gradient(var(--acc),var(--acc)) left 0 bottom 0/2px 14px,linear-gradient(var(--acc),var(--acc)) right 0 bottom 0/14px 2px,linear-gradient(var(--acc),var(--acc)) right 0 bottom 0/2px 14px;background-repeat:no-repeat;opacity:.85}
.ptitle{font-family:var(--disp);font-size:12.5px;font-weight:700;letter-spacing:.3em;color:var(--acc);text-shadow:0 0 10px var(--acc-glow)}
.psub{font-size:12px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;margin:4px 0 12px;font-family:var(--mono)}
.f{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;margin:12px 0 5px}
input,select{width:100%;background:rgba(2,8,14,.85);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:14px;padding:9px 11px;outline:none}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 1px var(--accd),0 0 18px var(--accd)}
input[type=range]{padding:0;accent-color:var(--acc)}
.quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.quick button{font-family:var(--mono);font-size:11px;color:var(--acc2);border:1px solid var(--line);background:none;padding:5px 10px;cursor:pointer;transition:.16s}
.quick button:hover,.quick button.on{border-color:var(--acc);color:var(--acc);background:var(--accd)}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subtabs{display:flex;gap:6px;margin-bottom:6px}
.subtab{font-family:var(--mono);font-size:10.5px;color:var(--mut);border:1px solid var(--line);background:none;padding:5px 11px;cursor:pointer;transition:.16s}
.subtab.on{background:var(--accd);border-color:var(--acc);color:var(--acc)}
.rmain{font-family:var(--disp);font-size:40px;font-weight:900;color:var(--acc);text-shadow:0 0 18px var(--acc-glow);line-height:1.1;word-break:break-word}
.rsub{font-family:var(--mono);font-size:11.5px;color:var(--mut);letter-spacing:.1em;margin:6px 0 16px}
.rrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;padding:8px 0;border-bottom:1px solid rgba(107,147,171,.12)}
.rrow .k{color:var(--mut);letter-spacing:.08em}
.rrow .v{color:var(--acc2)}
.tag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:3px 10px;border:1px solid var(--line);margin-top:4px}
.pcard{border:1px solid rgba(107,147,171,.2);padding:12px;margin-bottom:10px}
.pcard .lbl{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase}
.pcard .ans{font-family:var(--disp);font-size:24px;font-weight:700;color:var(--acc2);margin-top:4px}
@keyframes blink{50%{opacity:.25}}
#foot{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;gap:22px;align-items:center;font-family:var(--mono);font-size:10px;color:rgba(107,147,171,.7);letter-spacing:.2em;padding:6px 18px;border-top:1px solid rgba(107,147,171,.15);background:rgba(3,9,14,.8);backdrop-filter:blur(6px)}
#foot .dot{width:6px;height:6px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:blink 1.6s steps(1) infinite}
#termBtn{position:fixed;right:14px;bottom:38px;z-index:60;background:rgba(2,10,16,.92);border:1px solid var(--line);color:var(--acc2);font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;padding:7px 11px;cursor:pointer;transition:.2s}
#termBtn:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 14px var(--accd)}
#term{position:fixed;left:0;right:0;bottom:0;height:240px;transform:translateY(101%);z-index:70;background:rgba(2,7,12,.97);border-top:1px solid var(--acc);font-family:var(--mono);transition:transform .35s cubic-bezier(.2,.9,.25,1);display:flex;flex-direction:column;box-shadow:0 -12px 50px rgba(0,0,0,.6)}
#term.open{transform:none}
#termHead{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid rgba(107,147,171,.2);font-size:10px;letter-spacing:.26em;color:var(--acc)}
#termHead .tdot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:blink 1.6s steps(1) infinite}
#termHead .tx{margin-left:auto;cursor:pointer;color:var(--mut);font-size:13px;padding:0 4px}
#termHead .tx:hover{color:var(--red)}
#termBody{flex:1;overflow-y:auto;padding:10px 14px;font-size:11.5px;line-height:1.75}
.tline{white-space:pre-wrap;word-break:break-word}
.tline .tt{color:rgba(107,147,171,.6)}
.t-info{color:#9fd8ea}.t-ok{color:var(--grn)}.t-warn{color:var(--yel)}.t-err{color:var(--red)}.t-sys{color:var(--acc2)}
@media (max-width:640px){
  html,body{overflow-x:hidden}
  #topbar{flex-wrap:wrap;gap:8px 10px;padding:calc(8px + env(safe-area-inset-top)) 12px 8px}
  #topbar .spacer{display:none}#clk{display:none}
  .brand{font-size:12px;letter-spacing:.14em}.rtn{margin-left:auto}
  #jstrip{font-size:11px;padding:7px 12px}
  #wrap{margin:16px auto 92px!important;padding:0 12px!important}
  .rmain{font-size:32px}
  #foot{font-size:9px;gap:10px;letter-spacing:.12em}#foot span:nth-child(3){display:none}
  #term{height:52vh}
}
</style>
</head>
<body>
<canvas id="bgfx"></canvas>
<div class="scan"></div>
<header id="topbar">
  <div class="brand">◈ NETNEXUS <b>// EVERYDAY CALCULATORS</b></div>
  <span class="chip">GEN-22</span>
  <span class="chip ghost">GENERAL GALAXY</span>
  <div class="spacer"></div>
  <div id="clk"></div>
  <a class="rtn" href="../index.html">◂ RETURN TO NEXUS</a>
</header>
<div id="jstrip"><span class="jj">◤ NEXUS // </span><span id="jtext"></span></div>

<main id="wrap">
  <div class="mode-tabs" id="modes">
    <button class="mtab on" data-m="tip" type="button">TIP &amp; SPLIT</button>
    <button class="mtab" data-m="loan" type="button">LOAN / MORTGAGE</button>
    <button class="mtab" data-m="pct" type="button">PERCENTAGE</button>
    <button class="mtab" data-m="bmi" type="button">BODY METRICS</button>
  </div>
  <div class="cols">
    <section class="panel">
      <div class="ptitle">PARAMETERS</div>
      <div class="psub" id="pdesc">enter your values</div>

      <div class="fm" data-fm="tip">
        <label class="f">BILL AMOUNT ($)</label><input type="number" id="t_bill" value="60" step="0.01">
        <label class="f">TIP PERCENT — <span id="t_tv" style="color:var(--acc2)">18%</span></label>
        <div class="quick" id="t_quick"></div>
        <input type="range" id="t_tip" min="0" max="40" value="18">
        <label class="f">SPLIT BETWEEN (PEOPLE)</label><input type="number" id="t_people" value="2" min="1">
      </div>

      <div class="fm" data-fm="loan" hidden>
        <label class="f">LOAN AMOUNT ($)</label><input type="number" id="l_amt" value="25000" step="100">
        <label class="f">ANNUAL INTEREST RATE (%)</label><input type="number" id="l_rate" value="6.5" step="0.01">
        <label class="f">TERM (YEARS)</label><input type="number" id="l_years" value="5" step="1">
      </div>

      <div class="fm" data-fm="pct" hidden>
        <label class="f">WHAT IS X% OF Y</label>
        <div class="duo"><input type="number" id="p_x1" value="15" placeholder="X %"><input type="number" id="p_y1" value="200" placeholder="Y"></div>
        <label class="f">X IS WHAT % OF Y</label>
        <div class="duo"><input type="number" id="p_a2" value="45" placeholder="X"><input type="number" id="p_b2" value="180" placeholder="Y"></div>
        <label class="f">PERCENT CHANGE FROM A TO B</label>
        <div class="duo"><input type="number" id="p_a3" value="120" placeholder="A (old)"><input type="number" id="p_b3" value="150" placeholder="B (new)"></div>
      </div>

      <div class="fm" data-fm="bmi" hidden>
        <div class="subtabs" id="b_units"><button class="subtab on" data-u="metric" type="button">METRIC</button><button class="subtab" data-u="imp" type="button">IMPERIAL</button></div>
        <div id="b_metric">
          <label class="f">HEIGHT (CM)</label><input type="number" id="b_hcm" value="175">
          <label class="f">WEIGHT (KG)</label><input type="number" id="b_wkg" value="72">
        </div>
        <div id="b_imp" hidden>
          <label class="f">HEIGHT (FT / IN)</label>
          <div class="duo"><input type="number" id="b_ft" value="5" placeholder="ft"><input type="number" id="b_in" value="9" placeholder="in"></div>
          <label class="f">WEIGHT (LB)</label><input type="number" id="b_lb" value="159">
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="ptitle">RESULT</div>
      <div class="psub">live · rounded to 2 decimals</div>
      <div id="results"></div>
    </section>
  </div>
</main>

<footer id="foot"><span class="dot"></span><span>GEN-22 ACTIVE</span><span>TIP · LOAN · PERCENTAGE · BMI — EVERY FIGURE COMPUTED IN YOUR BROWSER</span><span style="margin-left:auto">NETNEXUS v2.1</span></footer>
<button id="termBtn">⌬ SYS TERMINAL</button>
<aside id="term"><div id="termHead"><span class="tdot"></span> STARK-CORE DIAGNOSTIC TERMINAL — GEN-22 <span style="opacity:.5">[CTRL+`]</span><span class="tx" id="termX">✕</span></div><div id="termBody"></div></aside>

<script>
'use strict';
window.__nnlog=[];
window.onerror=function(m,s,l){window.__nnlog.push(['ERR '+m+' @'+(s||'?').split('/').pop()+':'+l,'err']);return false;};
window.addEventListener('unhandledrejection',e=>window.__nnlog.push(['PROMISE REJECTION :: '+(e.reason&&e.reason.message||e.reason),'err']));
document.addEventListener('DOMContentLoaded',()=>{
  const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
  const termBody=$('#termBody'),term=$('#term');
  function T(msg,lv='info'){const d=document.createElement('div');d.className='tline t-'+lv;d.innerHTML='<span class="tt">['+new Date().toTimeString().slice(0,8)+']</span> '+String(msg).replace(/</g,'&lt;');termBody.appendChild(d);while(termBody.children.length>200)termBody.firstChild.remove();termBody.scrollTop=termBody.scrollHeight;}
  window.__nnlog.forEach(a=>T(a[0],a[1]));window.__nnlog={push:a=>T(a[0],a[1])};
  const _ce=console.error.bind(console),_cw=console.warn.bind(console);
  console.error=(...a)=>{T(a.map(String).join(' '),'err');_ce(...a)};
  console.warn=(...a)=>{T(a.map(String).join(' '),'warn');_cw(...a)};
  $('#termBtn').addEventListener('click',()=>term.classList.toggle('open'));
  $('#termX').addEventListener('click',()=>term.classList.remove('open'));
  window.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='`'){e.preventDefault();term.classList.toggle('open');}});
  if(window.__twFail)T('TAILWIND CDN UNREACHABLE — LOCAL STYLE CORE ENGAGED','warn');
  let _jt=null;function jsay(t){T('NEXUS :: '+t,'sys');const el=$('#jtext');clearInterval(_jt);let i=0;_jt=setInterval(()=>{el.textContent=t.slice(0,++i)+(i<t.length?'▊':'');if(i>=t.length)clearInterval(_jt);},14);}
  setInterval(()=>{const d=new Date();$('#clk').innerHTML='<b>'+d.toTimeString().slice(0,8)+'</b> L';},1000);
  const cv=$('#bgfx'),cg=cv.getContext('2d');let W=innerWidth,H=innerHeight,tt=0;
  const AR=document.documentElement.dataset.galaxy==='gen'?'255,157,51':'0,229,255';
  function rs(){W=innerWidth;H=innerHeight;const D=Math.min(devicePixelRatio||1,1.5);cv.width=W*D;cv.height=H*D;cg.setTransform(D,0,0,D,0,0);}
  rs();window.addEventListener('resize',rs);
  const pts=Array.from({length:30},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14}));
  let sweep=-200;
  (function bg(){const dt=1/60;tt+=dt;cg.clearRect(0,0,W,H);cg.strokeStyle='rgba('+AR+',.045)';cg.lineWidth=1;const sp=92,off=(tt*5)%sp;cg.beginPath();for(let x=off;x<W;x+=sp){cg.moveTo(x,0);cg.lineTo(x,H)}for(let y=off*.6;y<H;y+=sp){cg.moveTo(0,y);cg.lineTo(W,y)}cg.stroke();cg.fillStyle='rgba('+AR+',.5)';for(const p of pts){p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;cg.fillRect(p.x,p.y,1.6,1.6);}sweep+=2.2;if(sweep>H+200)sweep=-200;const gr=cg.createLinearGradient(0,sweep-60,0,sweep);gr.addColorStop(0,'rgba('+AR+',0)');gr.addColorStop(1,'rgba('+AR+',.05)');cg.fillStyle=gr;cg.fillRect(0,sweep-60,W,60);if(!document.hidden)requestAnimationFrame(bg);else setTimeout(bg,400);})();
  T('MODULE KERNEL ONLINE :: GEN-22 EVERYDAY CALCULATORS','ok');

  /* ===== CALCULATORS ===== */
  const results=$('#results'),pdesc=$('#pdesc');
  let mode='tip';
  const num=id=>{const v=parseFloat($('#'+id).value);return isNaN(v)?0:v;};
  const money=n=>'$'+(isFinite(n)?n:0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmt=n=>(isFinite(n)?+n.toFixed(2):0).toLocaleString('en-US',{maximumFractionDigits:2});
  function render(main,sub,rows){results.innerHTML='<div class="rmain">'+main+'</div><div class="rsub">'+sub+'</div>'+rows.map(r=>'<div class="rrow"><span class="k">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>').join('');}

  /* tip quick buttons */
  const QT=[10,15,18,20,25];
  $('#t_quick').innerHTML=QT.map(p=>'<button type="button" data-p="'+p+'">'+p+'%</button>').join('');
  $('#t_quick').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;$('#t_tip').value=b.dataset.p;compute();});

  /* bmi unit toggle */
  let bunit='metric';
  $('#b_units').addEventListener('click',e=>{const b=e.target.closest('.subtab');if(!b)return;bunit=b.dataset.u;$$('#b_units .subtab').forEach(x=>x.classList.toggle('on',x===b));$('#b_metric').hidden=bunit!=='metric';$('#b_imp').hidden=bunit==='metric';compute();});

  function compute(){
    if(mode==='tip'){
      const bill=num('t_bill'),tip=num('t_tip'),ppl=Math.max(1,Math.round(num('t_people'))||1);
      $('#t_tv').textContent=tip+'%';
      const tipAmt=bill*tip/100,total=bill+tipAmt;
      render(money(total/ppl),'per person · '+ppl+'-way split',[['Bill',money(bill)],['Tip ('+tip+'%)',money(tipAmt)],['Grand total',money(total)],['Tip per person',money(tipAmt/ppl)]]);
    }else if(mode==='loan'){
      const P=num('l_amt'),ar=num('l_rate'),yrs=num('l_years'),n=Math.round(yrs*12),r=ar/100/12;
      let m;if(r===0)m=n?P/n:0;else m=P*r/(1-Math.pow(1+r,-n));
      const total=m*n,interest=total-P;
      render(money(m),'per month · '+n+' payments',[['Principal',money(P)],['Total interest',money(interest)],['Total repaid',money(total)],['Interest share',(total?fmt(interest/total*100):0)+'%']]);
    }else if(mode==='pct'){
      const a1=num('p_x1')/100*num('p_y1');
      const b2=num('p_b2'),r2=b2?num('p_a2')/b2*100:0;
      const a3=num('p_a3'),ch=a3?(num('p_b3')-a3)/a3*100:0;
      results.innerHTML=
        '<div class="pcard"><div class="lbl">'+num('p_x1')+'% of '+num('p_y1')+'</div><div class="ans">'+fmt(a1)+'</div></div>'+
        '<div class="pcard"><div class="lbl">'+num('p_a2')+' is what % of '+num('p_b2')+'</div><div class="ans">'+fmt(r2)+'%</div></div>'+
        '<div class="pcard"><div class="lbl">change '+num('p_a3')+' → '+num('p_b3')+'</div><div class="ans" style="color:'+(ch>=0?'var(--grn)':'var(--red)')+'">'+(ch>=0?'+':'')+fmt(ch)+'%</div></div>';
    }else if(mode==='bmi'){
      let bmi=0,hLabel='';
      if(bunit==='metric'){const h=num('b_hcm')/100,w=num('b_wkg');bmi=h>0?w/(h*h):0;hLabel=num('b_hcm')+' cm · '+num('b_wkg')+' kg';}
      else{const hin=num('b_ft')*12+num('b_in'),w=num('b_lb');bmi=hin>0?703*w/(hin*hin):0;hLabel=num('b_ft')+'ft '+num('b_in')+'in · '+num('b_lb')+' lb';}
      let cat,col;if(bmi<18.5){cat='UNDERWEIGHT';col='var(--yel)';}else if(bmi<25){cat='NORMAL';col='var(--grn)';}else if(bmi<30){cat='OVERWEIGHT';col='var(--or)';}else{cat='OBESE';col='var(--red)';}
      /* healthy weight range for the height */
      let rangeStr='—';
      if(bunit==='metric'){const h=num('b_hcm')/100;if(h>0)rangeStr=fmt(18.5*h*h)+'–'+fmt(24.9*h*h)+' kg';}
      else{const hin=num('b_ft')*12+num('b_in');if(hin>0)rangeStr=fmt(18.5*hin*hin/703)+'–'+fmt(24.9*hin*hin/703)+' lb';}
      render(fmt(bmi),hLabel,[['Category','<span style="color:'+col+'">'+cat+'</span>'],['Healthy BMI','18.5 – 24.9'],['Healthy weight',rangeStr]]);
    }
  }
  $('#wrap').addEventListener('input',compute);
  $('#modes').addEventListener('click',e=>{const b=e.target.closest('.mtab');if(!b)return;mode=b.dataset.m;
    $$('.mtab').forEach(x=>x.classList.toggle('on',x===b));
    $$('.fm').forEach(f=>f.hidden=f.dataset.fm!==mode);
    pdesc.textContent=({tip:'split the check with a fair tip',loan:'amortized fixed-rate payment',pct:'three percentage answers at once',bmi:'body mass index & healthy range'})[mode];
    T('MODE :: '+mode.toUpperCase(),'info');compute();});

  compute();
  jsay('Running the numbers, sir. Pick a calculator — the mathematics never lie.');
});
</script>
</body>
</html>
