<style>
:root{--red:#ff4757;--grn:#2eff9e;--yel:#ffd166;--or:#ff9d33;--bg0:#02050a;--ink:#d9f4ff;--mut:#6b93ab;--panel:rgba(7,17,27,.82);--mono:'Share Tech Mono',Consolas,monospace;--disp:'Orbitron','Segoe UI',sans-serif;--ui:'Rajdhani','Segoe UI',sans-serif}

*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1200px 700px at 50% -12%,#0a1e30 0%,var(--bg0) 58%) fixed,var(--bg0);color:var(--ink);font-family:var(--ui);min-height:100vh;overflow-x:hidden}

.brand{font-family:var(--disp);font-weight:700;font-size:14px;letter-spacing:.22em;color:var(--acc);text-shadow:0 0 14px var(--acc-glow);white-space:nowrap}

@media(max-width:860px){#wrap{grid-template-columns:1fr}}
.panel{position:relative;background:var(--panel);border:1px solid var(--line);padding:18px;backdrop-filter:blur(10px)}
.panel::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(var(--acc),var(--acc)) left 0 top 0/14px 2px,linear-gradient(var(--acc),var(--acc)) left 0 top 0/2px 14px,linear-gradient(var(--acc),var(--acc)) right 0 top 0/14px 2px,linear-gradient(var(--acc),var(--acc)) right 0 top 0/2px 14px,linear-gradient(var(--acc),var(--acc)) left 0 bottom 0/14px 2px,linear-gradient(var(--acc),var(--acc)) left 0 bottom 0/2px 14px,linear-gradient(var(--acc),var(--acc)) right 0 bottom 0/14px 2px,linear-gradient(var(--acc),var(--acc)) right 0 bottom 0/2px 14px;background-repeat:no-repeat;opacity:.85}

.f{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;margin:12px 0 5px}

  #jstrip{font-size:11px;padding:7px 12px}
  #wrap{margin:16px auto 92px!important;padding:0 12px!important}

  #term{height:52vh}

/* ============ MOBILE RESPONSIVE GUARD (fix: panels bleeding off-screen) ============
   Grid/flex children default to min-width:auto, so wide content (pre blocks,
   tables, long inputs) could force panels past the viewport edge, where the
   body's overflow-x:hidden CLIPPED them unreadably. These rules make every
   panel respect the viewport (box-sizing is already global) and let wide
   content scroll INSIDE its own panel instead of bleeding off-screen. */
@media (max-width:760px){
  #wrap{grid-template-columns:1fr!important;max-width:100vw!important}
  #wrap>*{min-width:0!important;max-width:100%!important}
  .panel{min-width:0!important;max-width:100%!important}
  .panel *{min-width:0}
  .panel pre,.panel code{white-space:pre-wrap;word-break:break-word;max-width:100%}
  .panel table{display:block;max-width:100%;overflow-x:auto}
  .panel img,.panel svg,.panel canvas{max-width:100%;height:auto}
  input,select,textarea,button{max-width:100%}
}

<script>

window.__nnlog=[];
window.onerror=function(m,s,l){window.__nnlog.push(['ERR '+m+' @'+(s||'?').split('/').pop()+':'+l,'err']);return false;};

  const cv=$('#bgfx'),cg=cv.getContext('2d');let W=innerWidth,H=innerHeight,tt=0;

  /* ================= QR ENGINE (byte mode, self-contained port of Nayuki's generator) ================= */
  const ECCPB=[

  const ECLBITS=[1,0,3,2]; /* format bits for L,M,Q,H */

  function utf8(str){const o=[];for(const ch of str){let c=ch.codePointAt(0);
    if(c<0x80)o.push(c);else if(c<0x800)o.push(0xC0|c>>6,0x80|c&63);

  function rawModules(v){let r=(16*v+128)*v+64;if(v>=2){const a=Math.floor(v/7)+2;r-=(25*a-10)*a-55;if(v>=7)r-=36;}return r;}
  function dataCodewordCount(v,ecl){return Math.floor(rawModules(v)/8)-ECCPB[ecl][v]*NUMBLK[ecl][v];}

  function rsRemainder(data,div){const r=new Array(div.length).fill(0);
    for(const b of data){const factor=b^r.shift();r.push(0);div.forEach((c,i)=>r[i]^=rsMul(c,factor));}return r;}
  function alignPositions(v){if(v===1)return [];const n=Math.floor(v/7)+2,size=v*4+17;
    const step=(v===32)?26:Math.ceil((size-13)/(n*2-2))*2;const res=[6];
    for(let pos=size-7;res.length<n;pos-=step)res.splice(1,0,pos);return res;}

  function buildQR(text,eclName){
    const ECL={L:0,M:1,Q:2,H:3};const ecl=ECL[eclName]==null?1:ECL[eclName];
    const data=utf8(text);
    let version=-1,ccbits=8,ndc=0;
    for(let v=1;v<=40;v++){ccbits=v<=9?8:16;const need=4+ccbits+data.length*8;if(need<=dataCodewordCount(v,ecl)*8){version=v;ndc=dataCodewordCount(v,ecl);break;}}
    if(version<0)throw new Error('Too much data — shorten the text or lower the error-correction level.');
    /* bit buffer */
    const bb=[];const put=(val,len)=>{for(let i=len-1;i>=0;i--)bb.push((val>>>i)&1);};
    put(4,4);put(data.length,ccbits);for(const b of data)put(b,8);
    const cap=ndc*8;put(0,Math.min(4,cap-bb.length));put(0,(8-bb.length%8)%8);
    for(let pad=0xEC;bb.length<cap;pad^=0xEC^0x11)put(pad,8);
    const dcw=new Array(ndc).fill(0);for(let i=0;i<bb.length;i++)dcw[i>>>3]|=bb[i]<<(7-(i&7));
    /* ecc + interleave */
    const numBlocks=NUMBLK[ecl][version],blockEcc=ECCPB[ecl][version];
    const rawCw=Math.floor(rawModules(version)/8);
    const numShort=numBlocks-rawCw%numBlocks,shortLen=Math.floor(rawCw/numBlocks);
    const blocks=[],div=rsDivisor(blockEcc);
    for(let i=0,k=0;i<numBlocks;i++){
      const dat=dcw.slice(k,k+shortLen-blockEcc+(i<numShort?0:1));k+=dat.length;
      const ecc=rsRemainder(dat,div);if(i<numShort)dat.push(0);blocks.push(dat.concat(ecc));}
    const all=[];
    for(let i=0;i<blocks[0].length;i++)for(let j=0;j<blocks.length;j++)
      if(i!==shortLen-blockEcc||j>=numShort)all.push(blocks[j][i]);
    /* matrix */
    const size=version*4+17;
    const mod=[],fn=[];for(let i=0;i<size;i++){mod.push(new Array(size).fill(false));fn.push(new Array(size).fill(false));}
    const set=(x,y,val)=>{mod[y][x]=val;fn[y][x]=true;};
    /* timing */
    for(let i=0;i<size;i++){set(6,i,i%2===0);set(i,6,i%2===0);}
    /* finders */
    const finder=(cx,cy)=>{for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){const d=Math.max(Math.abs(dx),Math.abs(dy)),xx=cx+dx,yy=cy+dy;if(xx>=0&&xx<size&&yy>=0&&yy<size)set(xx,yy,d!==2&&d!==4);}};
    finder(3,3);finder(size-4,3);finder(3,size-4);
    /* alignment */
    const ap=alignPositions(version),n=ap.length;
    for(let i=0;i<n;i++)for(let j=0;j<n;j++){if((i===0&&j===0)||(i===0&&j===n-1)||(i===n-1&&j===0))continue;
      const cx=ap[i],cy=ap[j];for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)set(cx+dx,cy+dy,Math.max(Math.abs(dx),Math.abs(dy))!==1);}
    /* dark module */
    set(8,size-8,true);
    /* reserve format + version cells */
    const drawFormat=(mask)=>{
      const d=(ECLBITS[ecl]<<3)|mask;let rem=d;for(let i=0;i<10;i++)rem=(rem<<1)^((rem>>>9)*0x537);
      const bits=((d<<10)|rem)^0x5412;
      for(let i=0;i<=5;i++)set(8,i,getBit(bits,i));
      set(8,7,getBit(bits,6));set(8,8,getBit(bits,7));set(7,8,getBit(bits,8));
      for(let i=9;i<15;i++)set(14-i,8,getBit(bits,i));
      for(let i=0;i<8;i++)set(size-1-i,8,getBit(bits,i));
      for(let i=8;i<15;i++)set(8,size-15+i,getBit(bits,i));
      set(8,size-8,true);
    };
    drawFormat(0);
    if(version>=7){let rem=version;for(let i=0;i<12;i++)rem=(rem<<1)^((rem>>>11)*0x1F25);const bits=version<<12|rem;
      for(let i=0;i<18;i++){const b=getBit(bits,i),a=size-11+i%3,c=Math.floor(i/3);set(a,c,b);set(c,a,b);}}
    /* place codewords */
    let bi=0;
    for(let right=size-1;right>=1;right-=2){if(right===6)right=5;
      for(let vert=0;vert<size;vert++)for(let jj=0;jj<2;jj++){
        const x=right-jj,upward=((right+1)&2)===0,y=upward?size-1-vert:vert;
        if(!fn[y][x]&&bi<all.length*8){mod[y][x]=getBit(all[bi>>>3],7-(bi&7));bi++;}}}
    /* masking */
    const applyMask=(m)=>{for(let y=0;y<size;y++)for(let x=0;x<size;x++){if(fn[y][x])continue;let inv;
      switch(m){case 0:inv=(x+y)%2===0;break;case 1:inv=y%2===0;break;case 2:inv=x%3===0;break;case 3:inv=(x+y)%3===0;break;
      case 4:inv=(Math.floor(x/3)+Math.floor(y/2))%2===0;break;case 5:inv=(x*y%2)+(x*y%3)===0;break;
      case 6:inv=((x*y%2)+(x*y%3))%2===0;break;case 7:inv=(((x+y)%2)+(x*y%3))%2===0;break;}
      if(inv)mod[y][x]=!mod[y][x];}};
    const addHist=(len,h)=>{if(h[0]===0)len+=size;h.pop();h.unshift(len);};
    const countPat=(h)=>{const c=h[1];const core=c>0&&h[2]===c&&h[3]===c*3&&h[4]===c&&h[5]===c;
      return (core&&h[0]>=c*4&&h[6]>=c?1:0)+(core&&h[6]>=c*4&&h[0]>=c?1:0);};
    const termCount=(col,len,h)=>{if(col){addHist(len,h);len=0;}len+=size;addHist(len,h);return countPat(h);};
    const penalty=()=>{let r=0;
      for(let y=0;y<size;y++){let col=false,run=0,h=[0,0,0,0,0,0,0];for(let x=0;x<size;x++){
        if(mod[y][x]===col){run++;if(run===5)r+=3;else if(run>5)r++;}else{addHist(run,h);if(!col)r+=countPat(h)*40;col=mod[y][x];run=1;}}
        r+=termCount(col,run,h)*40;}
      for(let x=0;x<size;x++){let col=false,run=0,h=[0,0,0,0,0,0,0];for(let y=0;y<size;y++){
        if(mod[y][x]===col){run++;if(run===5)r+=3;else if(run>5)r++;}else{addHist(run,h);if(!col)r+=countPat(h)*40;col=mod[y][x];run=1;}}
        r+=termCount(col,run,h)*40;}
      for(let y=0;y<size-1;y++)for(let x=0;x<size-1;x++){const c=mod[y][x];if(c===mod[y][x+1]&&c===mod[y+1][x]&&c===mod[y+1][x+1])r+=3;}
      let dark=0;for(let y=0;y<size;y++)for(let x=0;x<size;x++)if(mod[y][x])dark++;
      const total=size*size;const k=Math.ceil(Math.abs(dark*20-total*10)/total)-1;r+=k*10;return r;};
    let best=0,min=Infinity;
    for(let m=0;m<8;m++){applyMask(m);drawFormat(m);const p=penalty();if(p<min){min=p;best=m;}applyMask(m);}
    applyMask(best);drawFormat(best);
    return {size,modules:mod,version,ecc:eclName,mask:best,bytes:data.length};
  }
  window.__QR=buildQR;

  /* ================= UI ================= */
  let mode='text';
  function payload(){
    const g=id=>($('#'+id)?$('#'+id).value:'')||'';
    if(mode==='text')return g('q_text');
    if(mode==='url'){let u=g('q_url').trim();if(!u)return '';return /^[a-z]+:\/\//i.test(u)?u:'https://'+u;}
    if(mode==='wifi'){const esc=s=>s.replace(/([\\;,":])/g,'\\$1');const enc=g('w_enc');
      return 'WIFI:T:'+enc+';S:'+esc(g('w_ssid'))+';'+(enc==='nopass'?'':'P:'+esc(g('w_pass'))+';')+'H:'+g('w_hidden')+';;';}
    if(mode==='email'){const q=encodeURIComponent;const s=g('e_sub'),b=g('e_body');const qs=[s?'subject='+q(s):'',b?'body='+q(b):''].filter(Boolean).join('&');return 'mailto:'+g('e_to')+(qs?'?'+qs:'');}
    if(mode==='phone')return 'tel:'+g('p_num').replace(/\s+/g,'');
    if(mode==='sms')return 'SMSTO:'+g('s_num').replace(/\s+/g,'')+':'+g('s_msg');
    return '';
  }
  let lastQR=null;
  function render(){
    const err=$('#err');err.textContent='';
    const content=payload();
    if(!content){$('#meta').textContent='Nothing to encode yet.';return;}
    let qr;try{qr=buildQR(content,$('#ecc').value);}catch(e){err.textContent='✕ '+e.message;return;}
    lastQR=qr;
    const margin=+$('#margin').value,fg=$('#fg').value,bg=$('#bg').value;
    const scale=Math.max(2,Math.floor(320/(qr.size+2*margin)));
    const dim=(qr.size+2*margin)*scale;
    const c=$('#qc');c.width=dim;c.height=dim;const ctx=c.getContext('2d');
    ctx.fillStyle=bg;ctx.fillRect(0,0,dim,dim);ctx.fillStyle=fg;
    for(let y=0;y<qr.size;y++)for(let x=0;x<qr.size;x++)if(qr.modules[y][x])ctx.fillRect((x+margin)*scale,(y+margin)*scale,scale,scale);
    $('#meta').innerHTML='CONTENT <b>'+content.length+' chars</b> · VERSION <b>'+qr.version+'</b> ('+qr.size+'×'+qr.size+') · ECC <b>'+qr.ecc+'</b> · MASK <b>'+qr.mask+'</b>';
  }
  function svgString(){
    if(!lastQR)return '';const qr=lastQR,margin=+$('#margin').value,dim=qr.size+2*margin;
    let path='';for(let y=0;y<qr.size;y++)for(let x=0;x<qr.size;x++)if(qr.modules[y][x])path+='M'+(x+margin)+' '+(y+margin)+'h1v1h-1z';
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+dim+' '+dim+'" shape-rendering="crispEdges"><rect width="'+dim+'" height="'+dim+'" fill="'+$('#bg').value+'"/><path d="'+path+'" fill="'+$('#fg').value+'"/></svg>';
  }
  function download(name,url){const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();}
  $('#dlpng').addEventListener('click',()=>{if(!lastQR)return;const big=document.createElement('canvas');const margin=+$('#margin').value,sc=12,dim=(lastQR.size+2*margin)*sc;big.width=big.height=dim;const ctx=big.getContext('2d');ctx.fillStyle=$('#bg').value;ctx.fillRect(0,0,dim,dim);ctx.fillStyle=$('#fg').value;for(let y=0;y<lastQR.size;y++)for(let x=0;x<lastQR.size;x++)if(lastQR.modules[y][x])ctx.fillRect((x+margin)*sc,(y+margin)*sc,sc,sc);download('netnexus-qr.png',big.toDataURL('image/png'));T('EXPORT :: PNG '+dim+'px','ok');});
  $('#dlsvg').addEventListener('click',()=>{if(!lastQR)return;const blob=new Blob([svgString()],{type:'image/svg+xml'});download('netnexus-qr.svg',URL.createObjectURL(blob));T('EXPORT :: SVG','ok');});

  $('#modes').addEventListener('click',e=>{const b=e.target.closest('.mtab');if(!b)return;mode=b.dataset.m;
    $$('.mtab').forEach(x=>x.classList.toggle('on',x===b));
    $$('.fm').forEach(f=>f.hidden=f.dataset.fm!==mode);render();T('MODE :: '+mode.toUpperCase(),'info');});
  $('#wrap').addEventListener('input',render);
  render();
  jsay('QR studio online. Type your payload — I forge the code on the spot, sir.');
});
</script>
</body>
